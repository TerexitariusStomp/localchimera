apiVersion: apps/v1
kind: Deployment
metadata:
  name: qvac-chimera
  labels:
    app: qvac-pear-miner
    component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qvac-pear-miner
  template:
    metadata:
      labels:
        app: qvac-pear-miner
        component: inference
    spec:
      containers:
      - name: miner-node
        image: qvac-chimera:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: api
          protocol: TCP
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeMounts:
        - name: data
          mountPath: /app/data
        env:
        - name: NODE_ENV
          value: "production"
        livenessProbe:
          httpGet:
            path: /api/status
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/status
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qvac-pear-miner-service
  labels:
    app: qvac-pear-miner
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: api
  selector:
    app: qvac-pear-miner
