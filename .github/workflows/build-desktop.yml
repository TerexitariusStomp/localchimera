name: Build Desktop Apps

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-action@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor
        run: |
          cd chimera-desktop/supervisor
          go build -o supervisor main.go
      - name: Copy supervisor binary
        run: |
          mkdir -p chimera-desktop/src-tauri/bin
          cp chimera-desktop/supervisor/supervisor chimera-desktop/src-tauri/bin/supervisor-x86_64-unknown-linux-gnu
      - name: Install frontend deps
        run: |
          cd chimera-desktop
          npm install
      - name: Build frontend
        run: |
          cd chimera-desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./chimera-desktop
          args: "--target x86_64-unknown-linux-gnu"
          tagName: ${{ github.ref_name }}
          releaseName: "Chimera ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install."
          releaseDraft: true
          prerelease: false

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-action@stable
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor
        run: |
          cd chimera-desktop/supervisor
          go build -o supervisor.exe main.go
      - name: Copy supervisor binary
        run: |
          mkdir -p chimera-desktop/src-tauri/bin
          copy chimera-desktop/supervisor/supervisor.exe chimera-desktop/src-tauri/bin/supervisor-x86_64-pc-windows-msvc.exe
      - name: Install frontend deps
        run: |
          cd chimera-desktop
          npm install
      - name: Build frontend
        run: |
          cd chimera-desktop
          npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./chimera-desktop
          args: "--target x86_64-pc-windows-msvc"
          tagName: ${{ github.ref_name }}
          releaseName: "Chimera ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install."
          releaseDraft: true
          prerelease: false

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Build supervisor (universal)
        run: |
          cd chimera-desktop/supervisor
          GOARCH=amd64 go build -o supervisor-amd64 main.go
          GOARCH=arm64 go build -o supervisor-arm64 main.go
          lipo -create -output supervisor supervisor-amd64 supervisor-arm64
      - name: Copy supervisor binary
        run: |
          mkdir -p chimera-desktop/src-tauri/bin
          cp chimera-desktop/supervisor/supervisor chimera-desktop/src-tauri/bin/supervisor-universal-apple-darwin
      - name: Install frontend deps
        run: |
          cd chimera-desktop
          npm install
      - name: Build frontend
        run: |
          cd chimera-desktop
          npm run build
      - name: Build Tauri (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./chimera-desktop
          args: "--target universal-apple-darwin"
          tagName: ${{ github.ref_name }}
          releaseName: "Chimera ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install."
          releaseDraft: true
          prerelease: false
