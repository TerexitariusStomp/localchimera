name: Test Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install qvac deps
        run: cd qvac && npm install
      - name: Run test suite
        run: cd qvac && node --test tests/router.test.js tests/orchestrator.test.js tests/payout.test.js tests/payout-http.test.js tests/solana.test.js tests/auth.test.js
