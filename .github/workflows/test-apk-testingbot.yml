name: Test APK on TestingBot

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  testingbot-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest release APK (same as users download)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          AUTH="Authorization: token $GH_TOKEN"
          # Get the latest release that has APK assets
          APK_URL=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/LocalChimera/localchimera/releases?per_page=20" \
            | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          withAssets = [r for r in data if r.get('assets')]
          withAssets.sort(key=lambda r: r['created_at'], reverse=True)
          for rel in withAssets:
            for a in rel['assets']:
              if 'arm64' in a['name'].lower() and a['name'].endswith('.apk') and 'debug' not in a['name'].lower():
                print(a['browser_download_url'])
                sys.exit(0)
          ")
          echo "Downloading APK from: $APK_URL"
          curl -s -L -H "$AUTH" -o chimera.apk "$APK_URL"
          echo "Downloaded APK:"
          ls -lh chimera.apk

      - name: Upload APK to TestingBot
        id: upload
        env:
          TESTINGBOT_KEY: ${{ secrets.TESTINGBOT_KEY }}
          TESTINGBOT_SECRET: ${{ secrets.TESTINGBOT_SECRET }}
        run: |
          RESPONSE=$(curl -s -u "$TESTINGBOT_KEY:$TESTINGBOT_SECRET" \
            -X POST "https://api.testingbot.com/v1/storage" \
            -F "file=@chimera.apk")
          echo "Upload response: $RESPONSE"
          APP_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['app_url'])")
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Install test dependencies
        run: npm install webdriverio
        working-directory: scripts

      - name: Run smoke test on real Android device
        env:
          TESTINGBOT_KEY: ${{ secrets.TESTINGBOT_KEY }}
          TESTINGBOT_SECRET: ${{ secrets.TESTINGBOT_SECRET }}
          TESTINGBOT_APP_URL: ${{ steps.upload.outputs.app_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node testingbot-smoke-test.js
        working-directory: scripts

      - name: Upload test screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testingbot-screenshots
          path: |
            scripts/screenshot-*.png
            scripts/logcat*.txt
            scripts/page-source*.xml
